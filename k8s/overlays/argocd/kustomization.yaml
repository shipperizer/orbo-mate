apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base

patches:
  - target:
      version: v1
      kind: Secret
      name: orbo-mate-secret
    patch: |-
      apiVersion: v1
      kind: Secret
      metadata:
        name: orbo-mate-secret
        annotations:
          argocd.argoproj.io/sync-options: Skip
  - target:
      version: v1
      kind: ConfigMap
      name: orbo-mate-config
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: orbo-mate-config
      data:
        ALLOWED_ORGS: "shipperizer,canonical"
  - target:
      group: gateway.networking.k8s.io
      version: v1
      kind: Gateway
      name: orbo-mate-gateway
    patch: |-
      apiVersion: gateway.networking.k8s.io/v1
      kind: Gateway
      metadata:
        name: orbo-mate-gateway
        annotations:
          cert-manager.io/cluster-issuer: "letsencrypt-prod"
      spec:
        listeners:
        - name: https
          protocol: HTTPS
          port: 443
          hostname: "orbo.shipperizer.org"
          tls:
            mode: Terminate
            certificateRefs:
            - name: orbo-mate-tls
              kind: Secret
          allowedRoutes:
            namespaces:
              from: Same
  - target:
      group: gateway.networking.k8s.io
      version: v1
      kind: HTTPRoute
      name: orbo-mate-route
    patch: |-
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: orbo-mate-route
      spec:
        hostnames:
        - "orbo.shipperizer.org"
