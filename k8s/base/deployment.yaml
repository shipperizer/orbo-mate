apiVersion: apps/v1
kind: Deployment
metadata:
  name: orbo-mate
  labels:
    app: orbo-mate
  annotations:
    app.kubernetes.io/version: "0.1.0" # x-release-please-version
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orbo-mate
  template:
    metadata:
      labels:
        app: orbo-mate
    spec:
      serviceAccountName: orbo-mate
      containers:
      - name: orbo-mate
        image: orbo-mate
        args: ["server"]
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: orbo-mate-config
        - secretRef:
            name: orbo-mate-secret

