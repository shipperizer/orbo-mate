apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: orbo-mate-gateway
  labels:
    app: orbo-mate
spec:
  gatewayClassName: public-gateway
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: orbo-mate-route
  labels:
    app: orbo-mate
spec:
  parentRefs:
  - name: orbo-mate-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: orbo-mate
      port: 80
