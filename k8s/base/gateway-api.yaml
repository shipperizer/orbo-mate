apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: orbo-mate-gateway
  labels:
    app: orbo-mate
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
spec:
  gatewayClassName: cilium
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    hostname: "dummy.local"
    allowedRoutes:
      namespaces:
        from: Same
  - name: https
    protocol: HTTPS
    port: 443
    hostname: "dummy.local"
    tls:
      mode: Terminate
      certificateRefs:
      - name: orbo-mate-tls
        kind: Secret
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: orbo-mate-route
  labels:
    app: orbo-mate
spec:
  parentRefs:
  - name: orbo-mate-gateway
  hostnames:
  - "dummy.local"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: orbo-mate
      port: 80
