apiVersion: v1
kind: ConfigMap
metadata:
  name: orbo-mate-config
  labels:
    app: orbo-mate
data:
  ALLOWED_ORGS: "dummy-org,another-org"
  DEFAULT_MODEL: "meta-llama/llama-3.1-70b-instruct"
