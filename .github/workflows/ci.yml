name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test Go Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install mockgen
        run: go install go.uber.org/mock/mockgen@v0.6.0

      - name: Run go generate for mocks
        run: go generate ./...

      - name: Run fmt check
        run: make fmt

      - name: Run vet
        run: make vet

      - name: Start Podman API service
        run: |
          sudo mkdir -p /run/user/1000/podman
          sudo chown -R $(whoami) /run/user/1000/podman
          BUILDPLATFORM=linux/amd64 podman system service --time=0 unix:///run/user/1000/podman/podman.sock &
          sleep 2

      - name: Run tests with race detector
        run: make test

  build:
    name: Build and Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install Skaffold
        run: |
          curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64
          chmod +x skaffold
          sudo mv skaffold /usr/local/bin

      - name: Log in to GitHub Container Registry (GHCR)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push with Skaffold
        env:
          DOCKER_BUILDKIT: 1
          SKAFFOLD_DEFAULT_REPO: ghcr.io/shipperizer
        run: |
          PLATFORM="linux/amd64"
          if [ "${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}" = "true" ]; then
            PLATFORM="linux/amd64,linux/arm64"
          fi
          skaffold build \
            --platform=$PLATFORM \
            --push=${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
